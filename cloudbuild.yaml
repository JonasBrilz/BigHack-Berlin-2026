options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/gsutil
    entrypoint: sh
    args:
      - -c
      - |
        gsutil cp gs://bighack-berlin-build-cache/node_modules.tar.gz . && tar -xzf node_modules.tar.gz || true

  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci --quiet

  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - npm run build

  - name: gcr.io/cloud-builders/gsutil
    entrypoint: sh
    args:
      - -c
      - tar -czf node_modules.tar.gz node_modules && gsutil cp node_modules.tar.gz gs://bighack-berlin-build-cache/node_modules.tar.gz

  - name: gcr.io/cloud-builders/gsutil
    args:
      - -m
      - rsync
      - -r
      - -d
      - ./out
      - gs://trackwinner-lol
