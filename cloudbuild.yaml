options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/gsutil
    entrypoint: sh
    args:
      - -c
      - |
        gsutil -m cp -r gs://bighack-berlin-build-cache/node_modules . || true
        gsutil -m cp -r gs://bighack-berlin-build-cache/.next-cache ./.next || true

  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci --quiet

  - name: node:22-alpine
    entrypoint: sh
    args:
      - -c
      - npm run build

  - name: gcr.io/cloud-builders/gsutil
    entrypoint: sh
    args:
      - -c
      - |
        gsutil -m cp -r ./node_modules gs://bighack-berlin-build-cache/node_modules || true
        gsutil -m cp -r ./.next/cache gs://bighack-berlin-build-cache/.next-cache || true

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bighack-berlin
      - --source=.
      - --region=europe-west1
      - --platform=managed
      - --allow-unauthenticated
